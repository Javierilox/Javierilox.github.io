<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javier Orellana | Portafolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        darkBg: '#0f0f11',
                        lightBg: '#f4f4f6'
                    }
                }
            }
        }
    </script>
    <style>
        /* Textura de ruido de fondo */
        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        /* Tipografía con contorno hueco (Como en la imagen) */
        .text-outline {
            color: transparent;
            -webkit-text-stroke: 2px currentColor;
        }

        /* Animación de las formas de colores (Blobs) */
        @keyframes float {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            animation: float 10s infinite ease-in-out;
            opacity: 0.6;
            z-index: 0;
        }
        .dark .blob { opacity: 0.4; }
    </style>
</head>
<body class="bg-lightBg text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-colors duration-500 overflow-hidden relative">

    <div class="noise-bg"></div>

    <div class="blob bg-gradient-to-r from-pink-300 to-purple-300 dark:from-purple-600 dark:to-indigo-600 w-96 h-96 top-[-10%] left-[-10%] animation-delay-2000"></div>
    <div class="blob bg-gradient-to-r from-cyan-300 to-emerald-200 dark:from-cyan-700 dark:to-teal-500 w-[500px] h-[500px] bottom-[-20%] right-[-10%]"></div>
    <div class="blob bg-gradient-to-r from-yellow-200 to-orange-200 dark:from-orange-700 dark:to-rose-600 w-80 h-80 top-[20%] left-[40%] animation-delay-4000"></div>

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-40 backdrop-blur-sm bg-white/10 dark:bg-black/10 border-b border-gray-200/20 dark:border-white/10">
        <a href="#" class="font-black text-2xl tracking-tighter">JO<span class="text-emerald-500">.</span></a>

        <div class="flex items-center gap-6 font-medium text-sm">
            <button class="hover:text-emerald-500 transition-colors">EN</button>
            
            <button id="themeToggle" class="hover:text-emerald-500 transition-colors">
                <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>

            <button id="menuToggle" class="hover:text-emerald-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>
    </nav>

    <div id="fullMenu" class="fixed inset-0 bg-white/95 dark:bg-[#0a0a0a]/95 backdrop-blur-xl z-30 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <ul class="text-4xl md:text-6xl font-bold text-center space-y-8 tracking-tight">
            <li><a href="#" class="hover:text-emerald-500 transition-colors">Inicio</a></li>
            <li><a href="proyectos.html" class="hover:text-emerald-500 transition-colors">Proyectos</a></li>
            <li><a href="sobre-mi.html" class="hover:text-emerald-500 transition-colors">Sobre Mí</a></li>
            <li><a href="mailto:javier.orellana2001@gmail.com" class="hover:text-emerald-500 transition-colors text-2xl text-gray-500 mt-8 block">javier.orellana2001@gmail.com</a></li>
        </ul>
    </div>

    <main class="relative z-10 flex flex-col items-center justify-center h-screen px-4 text-center">
        
        <h1 class="text-5xl md:text-7xl lg:text-8xl font-black uppercase tracking-tighter leading-none mb-4">
            Hola, soy <br class="md:hidden">
            Javier <span class="text-outline text-gray-900 dark:text-white">Orellana</span>
        </h1>
        
        <p class="text-sm md:text-lg text-gray-600 dark:text-gray-400 font-medium max-w-2xl mb-8">
            Ingeniero en Informática, desarrollador web , especialista en Análisis & automatización de datos.
        </p>

        <div class="flex flex-col md:flex-row items-center gap-6 font-medium text-sm md:text-base">
            <a href="proyectos.html" class="group flex items-center gap-2 hover:text-emerald-500 transition-colors">
                <span class="opacity-50 group-hover:opacity-100 transition-opacity">→</span> Ver mis proyectos
            </a>
            
            <a href="sobre-mi.html" class="group flex items-center gap-2 hover:text-emerald-500 transition-colors">
                <span class="opacity-50 group-hover:opacity-100 transition-opacity">→</span> Saber más de mí
            </a>

            <a href="cv.pdf" download class="group flex items-center gap-2 bg-gray-900 text-white dark:bg-white dark:text-black px-6 py-2 rounded-full hover:bg-emerald-500 dark:hover:bg-emerald-500 hover:text-white transition-all shadow-lg hover:shadow-emerald-500/25">
                Descargar CV
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </a>
        </div>
    </main>

    <script>
        // Lógica Modo Noche / Día
        const htmlElement = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');

        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                moonIcon.classList.add('hidden');
                sunIcon.classList.remove('hidden');
            } else {
                moonIcon.classList.remove('hidden');
                sunIcon.classList.add('hidden');
            }
        });

        // Lógica Menú Desplegable
        const menuToggle = document.getElementById('menuToggle');
        const fullMenu = document.getElementById('fullMenu');
        let menuOpen = false;

        menuToggle.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                fullMenu.classList.remove('opacity-0', 'pointer-events-none');
                fullMenu.classList.add('opacity-100', 'pointer-events-auto');
            } else {
                fullMenu.classList.remove('opacity-100', 'pointer-events-auto');
                fullMenu.classList.add('opacity-0', 'pointer-events-none');
            }
        });
    </script>
</body>
</html>
